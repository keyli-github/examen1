<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Personal — TecSup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <a href="/" class="logo-pill">
        <img src="{{ url_for('static', filename='assets/img_tecsup.jpeg') }}" alt="TecSup">
        <span>TecSup</span>
      </a>
    </div>

    <nav class="nav-section">
      <div class="nav-section-label">Principal</div>
      <a href="/" class="nav-item active">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Registro
      </a>
      <a href="/administrar" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Personal
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar">AD</div>
        <div>
          <div class="user-name">Administrador</div>
          <div class="user-role">Sistema TecSup</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <header class="topbar">
      <div class="topbar-breadcrumb">
        <span class="breadcrumb-sep">Inicio</span>
        <span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-current">Registro de Personal</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="fecha-actual"></span>
        <div class="user-avatar" style="width:32px;height:32px;font-size:12px;">AD</div>
      </div>
    </header>

    <main class="page-content">

      <div class="page-header">
        <h1 class="page-title">Registro de Personal</h1>
        <p class="page-subtitle">Ingresa los datos del nuevo colaborador</p>
      </div>

      <!-- Form Panel -->
      <div class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">Nuevo registro</div>
            <div class="panel-subtitle">Todos los campos marcados con * son obligatorios</div>
          </div>
          <div class="panel-steps">
            <div class="step-dot done"></div>
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
          </div>
        </div>

        <form action="/registrar" method="post" id="formRegistro">
          <div class="form-body">
            <div class="form-grid">

              <div class="form-field">
                <label class="field-label" for="dni">DNI <span class="field-required">*</span></label>
                <div class="input-wrapper">
                  <svg class="input-icon" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
                  <input class="field-input" type="text" id="dni" name="dni"
                         placeholder="Ej: 72841956" maxlength="8" required
                         oninput="this.value=this.value.replace(/\D/g,'')">
                </div>
                <span class="field-hint">8 dígitos sin puntos ni guiones</span>
              </div>

              <div class="form-field">
                <label class="field-label" for="telefono">Teléfono</label>
                <div class="input-wrapper">
                  <svg class="input-icon" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.59a16 16 0 0 0 6 6l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16"/></svg>
                  <input class="field-input" type="text" id="telefono" name="telefono"
                         placeholder="Ej: 987 654 321">
                </div>
              </div>

              <div class="form-field">
                <label class="field-label" for="nombre">Nombre <span class="field-required">*</span></label>
                <div class="input-wrapper">
                  <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                  <input class="field-input" type="text" id="nombre" name="nombre"
                         placeholder="Nombre(s)" required>
                </div>
              </div>

              <div class="form-field">
                <label class="field-label" for="apellido">Apellido <span class="field-required">*</span></label>
                <div class="input-wrapper">
                  <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                  <input class="field-input" type="text" id="apellido" name="apellido"
                         placeholder="Apellido(s)" required>
                </div>
              </div>

              <div class="form-field full">
                <label class="field-label" for="direccion">Dirección</label>
                <div class="input-wrapper">
                  <svg class="input-icon" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  <input class="field-input" type="text" id="direccion" name="direccion"
                         placeholder="Av. / Jr. / Ca. — Ciudad">
                </div>
              </div>

            </div>
          </div>

          <div class="panel-footer">
            <span class="footer-note"><span class="field-required">*</span> Campos requeridos</span>
            <div class="footer-actions">
              <button type="reset" class="btn btn-ghost">Limpiar</button>
              <button type="submit" class="btn btn-primary">
                <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Registrar persona
              </button>
            </div>
          </div>
        </form>
      </div>

    </main>
  </div>
</div>

<script>
  // Fecha en topbar
  const d = new Date();
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  document.getElementById('fecha-actual').textContent =
    d.toLocaleDateString('es-PE', opts);

  // Marcar inputs válidos al escribir
  document.querySelectorAll('.field-input[required]').forEach(inp => {
    inp.addEventListener('input', () => {
      inp.classList.toggle('is-valid', inp.value.trim().length > 0);
    });
  });
</script>
</body>
</html>
